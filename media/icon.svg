<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Rounded square background, neutral slate so it reads on light & dark themes -->
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="#2B3440"/>

  <!-- Em-dash: long horizontal stroke, off-white for contrast -->
  <rect x="20" y="58" width="88" height="12" rx="3" ry="3" fill="#F2EFE8"/>

  <!-- Diagonal strikethrough: red, drawn last so it sits on top -->
  <!-- Slight shadow stroke first to keep the red crisp against the dash -->
  <line x1="22" y1="106" x2="106" y2="22" stroke="#1A1F26" stroke-width="18" stroke-linecap="round"/>
  <line x1="22" y1="106" x2="106" y2="22" stroke="#E5484D" stroke-width="12" stroke-linecap="round"/>
</svg>
